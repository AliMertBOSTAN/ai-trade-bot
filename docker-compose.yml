# Python motorunu tek komutla ayağa kaldırır: docker compose up
# (Electron masaüstü arayüzü ayrı çalışır ve http://localhost:8787'ye bağlanır.)
services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    image: ai-trade-bot-engine
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - LOG_FILE=1
    volumes:
      - engine-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8787/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Rust emir-iletim servisi (ADR-0001). Python motoru EXEC_BACKEND=rust ile bağlanır.
  execd:
    build:
      context: .
      dockerfile: execd/Dockerfile
    image: ai-trade-bot-execd
    ports:
      - "127.0.0.1:8788:8788"   # yalnız localhost'a aç (güvenlik)
    env_file:
      - .env
    environment:
      - EXECD_PORT=8788
      - EXECD_MODE=paper        # live'a yalnız bilinçli geçin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8788/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  engine-data:
